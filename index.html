<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stress-Aware Inventory Decision Dashboard</title>
  <meta name="description" content="A decision-support tool that estimates stockout risk under uncertainty and recommends minimum feasible inventory coverage based on supply chain stress conditions." />

  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <style>
    /* ─── TOKENS ─────────────────────────────────────────────────────────── */
    :root, [data-theme="light"] {
      --bg:          #f2f1ee;
      --surface:     #fafaf8;
      --surface-2:   #f5f4f1;
      --surface-3:   #eeede9;
      --border:      #d0cdc6;
      --divider:     #dbd8d2;
      --text:        #18170f;
      --text-muted:  #6b6965;
      --text-faint:  #a5a39f;
      --primary:     #16515a;
      --primary-lt:  #1e6d79;
      --primary-bg:  #deeef0;
      --primary-dim: rgba(22,81,90,.12);
      --ok:          #2d6b1a;
      --ok-bg:       #d8efcf;
      --warn:        #8a3c10;
      --warn-bg:     #f5e0d2;
      --err:         #8b1a1a;
      --err-bg:      #f5d8d8;
      --low-c:       #1a6040;
      --low-bg:      #d4eee0;
      --hi-c:        #7a4010;
      --hi-bg:       #f5e5d0;
      --ex-c:        #6b1414;
      --ex-bg:       #f5d4d4;

      --ch-low:      #20808D;
      --ch-norm:     #437a22;
      --ch-hi:       #da7101;
      --ch-ex:       #a13544;
      --ch-tgt:      #7a39bb;
      --ch-ci:       rgba(22,81,90,.15);
      --ch-ci-line:  rgba(22,81,90,.35);

      --font:  'General Sans', 'Helvetica Neue', sans-serif;
      --mono:  'Geist Mono', 'Courier New', monospace;
      --xs:    clamp(.75rem, .7rem + .25vw, .875rem);
      --sm:    clamp(.875rem, .8rem + .35vw, 1rem);
      --base:  clamp(1rem, .95rem + .25vw, 1.125rem);
      --lg:    clamp(1.125rem, 1rem + .75vw, 1.5rem);
      --xl:    clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --r:     4px; --rm: 6px; --rl: 10px;
      --sh:    0 1px 2px rgba(20,18,14,.06);
      --shm:   0 3px 10px rgba(20,18,14,.09);
      --tr:    180ms cubic-bezier(.16,1,.3,1);
    }
    [data-theme="dark"] {
      --bg:         #111009;
      --surface:    #191814;
      --surface-2:  #1e1d19;
      --surface-3:  #242320;
      --border:     #333130;
      --divider:    #282724;
      --text:       #d2d1ce;
      --text-muted: #79776f;
      --text-faint: #4e4d49;
      --primary:    #4fa8b5;
      --primary-lt: #5bbcca;
      --primary-bg: #192e32;
      --primary-dim: rgba(79,168,181,.12);
      --ok:         #6daa45;  --ok-bg:  #1b2e14;
      --warn:       #e08030;  --warn-bg:#2d1c08;
      --err:        #d16060;  --err-bg: #2d1010;
      --low-c:      #5daa7f;  --low-bg: #162318;
      --hi-c:       #e08030;  --hi-bg:  #2e1a08;
      --ex-c:       #d06060;  --ex-bg:  #2e1010;
      --ch-low:     #2ba5b5; --ch-norm:#6daa45; --ch-hi:#e08030; --ch-ex:#d06060;
      --ch-ci:      rgba(79,168,181,.15); --ch-ci-line:rgba(79,168,181,.35);
      --sh:  0 1px 2px rgba(0,0,0,.25);
      --shm: 0 3px 10px rgba(0,0,0,.38);
    }
    @media (prefers-color-scheme:dark){:root:not([data-theme]){
      --bg:#111009;--surface:#191814;--surface-2:#1e1d19;--surface-3:#242320;
      --border:#333130;--divider:#282724;--text:#d2d1ce;--text-muted:#79776f;--text-faint:#4e4d49;
      --primary:#4fa8b5;--primary-lt:#5bbcca;--primary-bg:#192e32;--primary-dim:rgba(79,168,181,.12);
      --ok:#6daa45;--ok-bg:#1b2e14;--warn:#e08030;--warn-bg:#2d1c08;--err:#d16060;--err-bg:#2d1010;
      --low-c:#5daa7f;--low-bg:#162318;--hi-c:#e08030;--hi-bg:#2e1a08;--ex-c:#d06060;--ex-bg:#2e1010;
      --ch-ci:rgba(79,168,181,.15);--ch-ci-line:rgba(79,168,181,.35);
      --sh:0 1px 2px rgba(0,0,0,.25);--shm:0 3px 10px rgba(0,0,0,.38);
    }}

    /* ─── BASE ───────────────────────────────────────────────────────────── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    body{font-family:var(--font);font-size:var(--sm);color:var(--text);background:var(--bg);line-height:1.5}
    svg{display:block} button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
    select{font:inherit;color:inherit}

    /* ─── LAYOUT ─────────────────────────────────────────────────────────── */
    /* 3 rows: topbar / live-bar / content */
    .shell{display:grid;grid-template-columns:272px 1fr;grid-template-rows:52px 22px 1fr;height:100dvh}

    /* ─── TOPBAR ─────────────────────────────────────────────────────────── */
    .topbar{
      grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:0 20px;
      background:var(--surface);border-bottom:1px solid var(--border);z-index:20
    }
    .tl{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
    .tl-logo{flex-shrink:0}
    .tl-text{min-width:0}
    .tl-title{font-size:var(--sm);font-weight:600;color:var(--text);letter-spacing:-.01em;line-height:1.2;white-space:nowrap}
    .tl-sub{font-size:var(--xs);color:var(--text-muted);line-height:1.3}
    .ta{display:flex;align-items:center;gap:8px;flex-shrink:0}

    .stress-pill{
      display:flex;align-items:center;gap:6px;padding:4px 10px;
      border-radius:var(--rm);border:1px solid var(--border);background:var(--surface-2);
      font-size:var(--xs);font-weight:600;transition:all var(--tr)
    }
    .stress-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background var(--tr)}

    .proto-badge{
      display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:3px;
      background:var(--warn-bg);color:var(--warn);font-size:10px;font-weight:600;
      letter-spacing:.05em;text-transform:uppercase;border:1px solid color-mix(in oklch,var(--warn) 20%,transparent)
    }
    .mock-label{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
      color:var(--text-faint);background:var(--surface-2);padding:2px 6px;border-radius:3px;
      border:1px solid var(--border)}

    .icon-btn{
      display:flex;align-items:center;justify-content:center;width:32px;height:32px;
      border-radius:var(--rm);color:var(--text-muted);transition:all var(--tr)
    }
    .icon-btn:hover{background:var(--surface-2);color:var(--text)}

    /* ─── SIDEBAR ────────────────────────────────────────────────────────── */
    .sidebar{
      grid-row:3;background:var(--surface);border-right:1px solid var(--border);
      overflow-y:auto;overscroll-behavior:contain;padding:14px 0
    }
    .sb-sect{padding:0 14px;margin-bottom:16px}
    .sb-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
      color:var(--text-faint);margin-bottom:10px}
    .ctrl-group{margin-bottom:12px}
    .ctrl-label{display:block;font-size:var(--xs);font-weight:500;color:var(--text-muted);margin-bottom:5px}
    .sb-divider{height:1px;background:var(--divider);margin:4px 14px 14px}

    /* Segmented */
    .seg{display:grid;gap:2px}
    .seg.c2{grid-template-columns:1fr 1fr} .seg.c3{grid-template-columns:1fr 1fr 1fr}
    .seg-btn{
      padding:5px 6px;border-radius:var(--r);border:1px solid var(--border);
      background:var(--bg);color:var(--text-muted);font-size:var(--xs);font-weight:500;
      text-align:center;cursor:pointer;transition:all var(--tr);white-space:nowrap
    }
    .seg-btn:hover:not(.active){background:var(--surface-2);color:var(--text);border-color:var(--text-faint)}
    .seg-btn.active{color:#fff;border-color:transparent}
    .seg-btn.r-low.active  {background:var(--low-c)}
    .seg-btn.r-norm.active {background:var(--primary)}
    .seg-btn.r-hi.active   {background:var(--hi-c)}
    .seg-btn.r-ex.active   {background:var(--ex-c)}
    .seg-btn.sc-bl.active  {background:var(--primary)}
    .seg-btn.sc-ss.active  {background:var(--ok)}
    .seg-btn.sc-tm.active  {background:#7a39bb}

    /* Select */
    .ctrl-sel{
      width:100%;padding:5px 28px 5px 8px;border-radius:var(--r);border:1px solid var(--border);
      background:var(--bg) url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%236b6965' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E") no-repeat right 8px center;
      color:var(--text);font-size:var(--xs);font-weight:500;appearance:none;cursor:pointer;
      transition:border-color var(--tr)
    }
    .ctrl-sel:focus{outline:2px solid var(--primary);outline-offset:2px}

    /* Slider */
    .sl-row{display:flex;align-items:center;gap:8px}
    .sl-val{font-family:var(--mono);font-size:var(--xs);font-weight:600;color:var(--primary);min-width:36px;text-align:right}
    input[type=range]{-webkit-appearance:none;flex:1;height:4px;border-radius:2px;background:var(--border);cursor:pointer;outline:none}
    input[type=range]::-webkit-slider-thumb{
      -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
      background:var(--primary);border:2px solid var(--surface);
      box-shadow:0 0 0 1px var(--primary);transition:box-shadow var(--tr)
    }
    input[type=range]::-webkit-slider-thumb:hover{box-shadow:0 0 0 3px var(--primary-dim)}

    /* Stress decomposition */
    .stress-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .stress-bar-label{font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-faint);width:72px;flex-shrink:0}
    .stress-bar-track{flex:1;height:4px;border-radius:2px;background:var(--surface-3);overflow:hidden}
    .stress-bar-fill{height:100%;border-radius:2px;transition:width .4s var(--tr),background .4s}
    .stress-bar-val{font-family:var(--mono);font-size:9px;color:var(--text-muted);min-width:28px;text-align:right}
