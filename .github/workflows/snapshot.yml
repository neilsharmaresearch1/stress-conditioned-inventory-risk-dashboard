name: Hourly Lane Stress Snapshot

# Captures a lane stress snapshot every hour by POSTing to the deployed
# /api/snapshot endpoint. Uses GitHub Actions cron (not Vercel Cron) to
# avoid plan-tier frequency limits and keep the schedule portable.
#
# Required GitHub Actions secrets:
#   SNAPSHOT_TOKEN    -- same value as the SNAPSHOT_TOKEN Vercel env var
#   DEPLOYED_URL      -- base URL of the Vercel deployment, no trailing slash
#                        canonical alias: https://stress-conditioned-inventory-risk-d.vercel.app
#   HEALTHCHECK_URL   -- (optional) healthchecks.io ping URL
#                        If set, pings start/success/fail on each run.
#                        If unset, the dead-man's switch is inactive.
#
# The job will:
#   1. POST to /api/snapshot with Bearer token auth
#   2. Log the response (regime + stressIndex + feedHealth)
#   3. Fail if the HTTP response is not 2xx

on:
  schedule:
    # Runs every hour at minute 0
    - cron: '0 * * * *'
  # Allow manual trigger from Actions tab for testing
  workflow_dispatch:

jobs:
  capture-snapshot:
    name: Capture hourly snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: POST to /api/snapshot
        env:
          SNAPSHOT_TOKEN:  ${{ secrets.SNAPSHOT_TOKEN }}
          DEPLOYED_URL:    ${{ secrets.DEPLOYED_URL }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          # Signal run start to dead-man's switch (no-op if HEALTHCHECK_URL not set)
          [ -n "${HEALTHCHECK_URL}" ] && \
            curl -fsS --retry 3 --max-time 5 "${HEALTHCHECK_URL}/start" >/dev/null 2>&1 || true

          echo "Triggering snapshot capture at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          RESPONSE=$(curl \
            --silent \
            --show-error \
            --fail-with-body \
            --max-time 30 \
            --request POST \
            --header "Authorization: Bearer ${SNAPSHOT_TOKEN}" \
            --header "Content-Type: application/json" \
            "${DEPLOYED_URL}/api/snapshot")

          echo "Response: ${RESPONSE}"

          # Extract key fields for the job log (jq is available on ubuntu-latest)
          REGIME=$(echo "${RESPONSE}" | jq -r '.regime // "unknown"')
          STRESS=$(echo "${RESPONSE}" | jq -r '.stressIndex // "unknown"')
          OK=$(echo "${RESPONSE}" | jq -r '.ok // false')

          echo "Regime:       ${REGIME}"
          echo "Stress index: ${STRESS}"
          echo "OK:           ${OK}"

          if [ "${OK}" != "true" ]; then
            echo "::error::Snapshot capture returned ok=false"
            [ -n "${HEALTHCHECK_URL}" ] && \
              curl -fsS --retry 3 --max-time 5 "${HEALTHCHECK_URL}/fail" >/dev/null 2>&1 || true
            exit 1
          fi

          # Signal success to dead-man's switch
          [ -n "${HEALTHCHECK_URL}" ] && \
            curl -fsS --retry 3 --max-time 5 "${HEALTHCHECK_URL}" >/dev/null 2>&1 || true

          echo "Snapshot captured successfully."
